---
- name: nextcloud role
  tags:
    - nextcloud
  block:

  # assert
  - name: Assertions for nextcloud role
    ansible.builtin.assert:
      that:
      - nextcloud_db_pw != None
      - nextcloud_admin_user != None
      - nextcloud_admin_pw != None
      - nextcloud_config_template != None

  # apt
  - name: Apt install {{ nextcloud_install_apt }}
    become: true
    ansible.builtin.package:
      name: "{{ nextcloud_install_apt }}"
      state: present

  # download
  - name: Download the latest Nextcloud zip archive
    become: true
    ansible.builtin.get_url:
      url: "{{ nextcloud_install_opt_url }}"
      dest: /tmp/nextcloud-latest.zip
      mode: '0644'

  # mkdir
  - name: Mkdir {{ nextcloud_install_opt_dst }}
    become: true
    ansible.builtin.file:
      path: "{{ nextcloud_install_opt_dst }}"
      state: directory
      owner: "{{ nextcloud_linux_user }}"
      group: "{{ nextcloud_linux_user }}"
      mode: '0755'

  # unzip
  - name: Unzip Nextcloud archive
    become: true
    ansible.builtin.unarchive:
      src: /tmp/nextcloud-latest.zip
      dest: "{{ nextcloud_install_opt_dst | dirname }}"
      remote_src: true
      owner: "{{ nextcloud_linux_user }}"
      group: "{{ nextcloud_linux_user }}"
      creates: "{{ nextcloud_install_opt_dst | }}/config/config.php"

  # check
  - name: Check if Nextcloud is already installed
    become: true
    ansible.builtin.stat:
      path: "{{ nextcloud_install_opt_dst }}/config/config.php"
    register: __nextcloud_config_file

  # install
  - when: __nextcloud_config_file.stat.exists == false
    name: Run Nextcloud installation via occ command
    become: true
    become_user: "{{ nextcloud_linux_user }}"
    no_log: true
    args:
      chdir: "{{ nextcloud_install_opt_dst }}"
    ansible.builtin.command:
      cmd: >
        php occ maintenance:install
        --database='mysql'
        --database-name="{{ nextcloud_db_name }}"
        --database-user="{{ nextcloud_db_user }}"
        --database-pass="{{ nextcloud_db_pw }}"
        --admin-user="{{ nextcloud_admin_user }}"
        --admin-pass="{{ nextcloud_admin_pw }}"

  - name: Config via OCC
    become: true
    become_user: "{{ nextcloud_linux_user }}"
    args:
      chdir: "{{ nextcloud_install_opt_dst }}"
    ansible.builtin.command: >
      php occ config:system:set {{ item.key }}
      {% if item.type is defined %}--type={{ item.type }}{% endif %}
      {% if item.value is string or item.value is number %}
      --value="{{ item.value }}"
      {% else %}
      {% for val in item.value %}
      --value="{{ val }}"
      {% endfor %}
      {% endif %}
    loop: "{{  }}"
    # Optional: Optimize execution by registering changes or running conditionally
    changed_when: true